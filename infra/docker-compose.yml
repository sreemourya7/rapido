services:

  # ---------------------------------------------------------------
  # PostgreSQL + PostGIS — durable, transactional system of record
  # ---------------------------------------------------------------
  postgres:
    image: postgis/postgis:16-3.4
    container_name: rapido-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rapido
      POSTGRES_PASSWORD: rapido_dev_pw
      POSTGRES_DB: rapido
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rapido -d rapido"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------
  # Redis — fast, ephemeral geo-index for live driver locations
  # ---------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: rapido-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------
  # Zookeeper — required by this Kafka image for broker coordination
  # ---------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: rapido-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # ---------------------------------------------------------------
  # Kafka — event bus connecting all services
  # ---------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: rapido-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ---------------------------------------------------------------
  # Kafka UI — optional, lets you see topics/messages in a browser
  # ---------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: rapido-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: rapido-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

volumes:
  postgres_data: